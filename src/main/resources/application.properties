spring.application.name=validacion
# Conexión a MySQL (creará la base de datos 'agenda_sena' automáticamente si no existe)
spring.datasource.url=jdbc:mysql://localhost:3306/agenda_sena?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=tu_contraseña_aqui
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
